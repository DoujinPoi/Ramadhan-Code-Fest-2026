<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ramadhan Prayer Times</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-a"></div>
    <div class="bg-glow bg-glow-b"></div>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">Ramadhan Coding Project</p>
        <h1>Indonesia Prayer Times Dashboard</h1>
        <p class="subtitle">
          Search city, select regency code, and load daily schedule from your
          API proxy.
        </p>
      </section>

      <section class="panel controls">
        <div class="field-row">
          <label for="citySearch">City Search</label>
          <div class="inline-input">
            <input
              id="citySearch"
              type="text"
              placeholder="jakarta"
              autocomplete="off"
            />
            <button id="searchBtn" type="button">Search</button>
          </div>
        </div>

        <div class="field-row">
          <label for="regencySelect">Regency</label>
          <select id="regencySelect"></select>
        </div>

        <div class="field-row">
          <label for="dateInput">Date</label>
          <input id="dateInput" type="date" />
        </div>

        <div class="action-row">
          <button id="loadBtn" type="button">Load Prayer Times</button>
          <a href="/api-info" target="_blank" rel="noreferrer">API Info</a>
        </div>

        <p id="statusText" class="status status-idle">Ready</p>
      </section>

      <section class="panel result" id="resultPanel" hidden>
        <div class="result-head">
          <h2 id="resultTitle">Schedule</h2>
          <span id="cacheBadge" class="cache-badge">live</span>
        </div>
        <div id="timeGrid" class="time-grid"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
